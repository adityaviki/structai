name: Deploy

# Auto-deploy to the Lightsail box on every push to main.
# Skips doc-only / workflow-only pushes (nothing to ship). You can also
# trigger a deploy by hand from the Actions tab (workflow_dispatch).
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.github/**'
  workflow_dispatch:

# Never let two deploys run at once; queue them instead of cancelling so an
# in-flight deploy.sh (migrations, restarts) is always allowed to finish.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH in and run deploy.sh
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          # uv sync + pnpm install + vite build + migrate can take a while.
          command_timeout: 30m
          script: |
            set -euo pipefail
            export PATH="$HOME/.local/bin:/usr/local/bin:/usr/bin:$PATH"
            cd /home/ubuntu/structai-v2
            bash deploy/deploy.sh
