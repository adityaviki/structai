[project]
name = "structai-core"
version = "0.0.0"
description = "Shared StructAI core: config, db models, IR, profile, agent, execute, store, eval."
requires-python = ">=3.12,<3.13"
dependencies = [
    "pydantic>=2.9",
    "pydantic-settings>=2.5",
    "sqlalchemy[asyncio]>=2.0",
    "polars>=1.0",
    "charset-normalizer>=3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/structai_core"]
