services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: structai
      POSTGRES_PASSWORD: structai
      POSTGRES_DB: structai
    ports:
      - "5432:5432"
    volumes:
      - structai_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U structai -d structai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  structai_pg:
